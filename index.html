<!-- HTML is case insensitive, so it doesn't matter if it is DOCTYPE or doctype, the code will work.-->
<!-- Example of tag: <example> </example> -->
<!--It's possible to create the essential just typing ! in the beginning.-->
<!-- A tag can have an attribute, one of the most used ones is the id="name", it must be unique for each tag. -->
 <!-- Another useful attribute is class="", it's an identifier like id="" but can be shared with other tags.-->
<!doctype html>
<html lang="en">

    <head>
        <meta charset="utf-8"> 
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>My website</title>
        <style>
           /*  h1 {
                background: blue;
            }

            #CSS {  Usando a hashtag(#) serve para pegar o id de uma tag de HTML. 
                background: red;
            }

            .blue-background {  Agora começando com um ponto, serve para pegar uma classe.
                background: blue;
            } */
        </style> 
    </head>

    <body>
        <h1 id="Heading" class="blue-background" style="background: blue;">Hello World</h1>
        <p>Studying <b>HTML and CSS</b>, so that I can begin my studies in <b>JavaScript</b>.</p>
        <h2 id="CSS" style="background: red">Testing CSS</h2> 
        <p id="Paragraph"><i>Little by little, this website is starting to change, isn't it?</i></p>
        <h3>Tomorrow I'm going to put an image here.</h3>
        <span>JG5</span><br> <!-- span is In-line, using br will break line-->
        <span>Developer</span><br>
        Domaining <br> Html5 <br>
        <a href="https://github.com/jgabriel5th" target="_blank">My GitHub Profile</a> <!-- Tag used to put a link.-->
        <img src="https://cdn-icons-png.flaticon.com/512/4466/4466528.png" alt="Web development logo" width="256" height="256"> <!-- Tag used to put an image.-->
        <a href="https://github.com/jgabriel5th/jgabriel5th.github.io" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/256/25/25231.png" alt="Link for this repository" width="50" height="44">
        </a>
    </body>
</html>
